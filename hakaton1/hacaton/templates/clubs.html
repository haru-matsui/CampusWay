{% extends "base.html" %} {% block title %}Клубы - CampusWay{% endblock %} {% block content %}

<section class="page-title">
    <h2>Клубы и кружки</h2>
    <p>Найди единомышленников и развивай свои таланты!</p>
</section>

<section class="clubs-grid">
    {% for club in clubs %}
    <div class="club-card">
        <div class="club-image">
            <img src="{{ club.image }}" alt="{{ club.alt }}">
        </div>
        <div class="club-info">
            <h3>{{ club.name }}</h3>
            <p>{{ club.description }}</p>
        </div>
    </div>
    {% endfor %}
</section>

{% endblock %}
